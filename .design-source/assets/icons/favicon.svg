<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- v2 favicon — distilled from the MotoCam app-icon device:
       angular grey camera body, brand-green top accent edge, circular
       lens with a brand-green ring + dark glass + white catch-light,
       and a small green status-LED strip at the bottom. -->
  <rect width="32" height="32" rx="7" fill="#1A1A1A"/>
  <!-- Camera body: chunky chamfered hex silhouette -->
  <path d="M4.5 13 L9 7.5 L23 7.5 L27.5 13 L27.5 21 L23 26.5 L9 26.5 L4.5 21 Z" fill="#50545b"/>
  <!-- Brand-green highlight along the top edge (signature accent) -->
  <path d="M9 7.5 L23 7.5 L26.5 11.8 L23.8 10.7 L9.2 10.7 L5.5 11.8 Z" fill="#AACC03"/>
  <!-- Lens — outer ring → bright brand stroke → dark glass → catch-light -->
  <circle cx="13" cy="17.5" r="5.6" fill="#2b2e34"/>
  <circle cx="13" cy="17.5" r="4.7" fill="#0d0d0d" stroke="#AACC03" stroke-width="1"/>
  <circle cx="14.4" cy="16.2" r="1.3" fill="#fbfbfb" opacity=".9"/>
  <!-- Small green status-LED strip near the bottom of the body -->
  <rect x="17.5" y="22" width="5.5" height="1.5" rx=".75" fill="#AACC03" opacity=".95"/>
</svg>
